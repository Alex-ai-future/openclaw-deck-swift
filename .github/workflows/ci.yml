name: CI

on:
  pull_request:
    branches: [ main, ai/* ]
  workflow_dispatch:

jobs:
  format:
    name: Code Format
    runs-on: macos-26
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install SwiftFormat
      run: brew install swiftformat
    
    - name: Check Format
      run: bash script/format.sh --check

  build-macos:
    name: Build macOS
    runs-on: macos-26
    needs: format
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build
      run: bash script/build.sh macos
    
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-app
        path: build/macos/DerivedData/Build/Products/Release/*.app
        if-no-files-found: warn

  build-ios:
    name: Build iOS
    runs-on: macos-26
    needs: format
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build
      run: bash script/build.sh ios

  build-ipados:
    name: Build iPadOS
    runs-on: macos-26
    needs: format
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build
      run: bash script/build.sh ipados

  test-macos:
    name: Unit Tests macOS
    runs-on: macos-26
    needs: build-macos
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Run Unit Tests
      run: bash script/run_unit_tests.sh macos
      timeout-minutes: 10
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-macos
        path: build/tests/TestResults.xcresult
        if-no-files-found: warn

  test-ios:
    name: Unit Tests iOS
    runs-on: macos-26
    needs: build-ios
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Run Unit Tests
      run: bash script/run_unit_tests.sh ios
      timeout-minutes: 10
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-ios
        path: build/tests_ios/TestResults.xcresult
        if-no-files-found: warn

  test-ipados:
    name: Unit Tests iPadOS
    runs-on: macos-26
    needs: build-ipados
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Run Unit Tests
      run: bash script/run_unit_tests.sh ipados
      timeout-minutes: 10
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-ipados
        path: build/tests_ipados/TestResults.xcresult
        if-no-files-found: warn
